ai_usage_summary: |
  Used Claude for architectural discussion and code review.
  No candidate data was fed to any LLM.
  All ranking logic is rule-based and runs fully offline with zero API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal candidate ranker built in pure Python with no external dependencies.
  Four scoring dimensions: skills match (40%), career quality (30%), behavioral
  signals (20%), and a red flag multiplier. Skills are matched against a curated
  list of JD requirements (embeddings, vector DBs, LLMs, Python) weighted by
  proficiency level, usage duration, and Redrob assessment scores. Career quality
  rewards product company AI/ML experience and penalises consulting-only backgrounds
  as stated in the JD. Behavioral signals down-weight candidates who are inactive,
  unresponsive, or unwilling to relocate. A honeypot detection step filters
  candidates with impossible profiles. Runtime is ~35 seconds for 100K candidates
  on CPU with zero network calls.

